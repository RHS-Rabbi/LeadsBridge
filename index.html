<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/assets/css/output.css">
</head>
<body>
    <header>
        <div class="container">
            <!-- Desktop Menu -->
            <div class="hidden lg:flex justify-between items-center">
                <div class="site-logo">
                    <a href="#">
                        <img src="/assets/img/Logo.png" alt="Site Logo" loading="lazy">
                    </a>
                </div>
                <nav class="mainmenu">
                    <ul>
                        <li><a class="active" href="#">Services</a></li>
